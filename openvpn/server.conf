# =============================================================
# OPENVPN SERVER CONFIGURATION
# FreeRADIUS ISP Billing System - OpenVPN Integration
#
# File: /etc/openvpn/server.conf
# Location: /etc/openvpn/server.conf (Linux) atau C:\Program Files\OpenVPN\config\server.ovpn (Windows)
#
# Description:
# OpenVPN server configuration untuk menghubungkan Mikrotik
# (yang tidak memiliki IP public) ke FreeRADIUS server.
#
# Auth: username/password via verify_radius.py script
# Protocol: UDP (lebih cepat dari TCP untuk RADIUS)
#
# =============================================================

# =============================================================
# PROTOCOL & PORT
# =============================================================

# Port default OpenVPN
port 1194

# Protocol UDP lebih baik untuk RADIUS (faster, lower latency)
# Ganti ke 'tcp' jika ada masalah firewall
proto udp

# Device type: tun (layer 3 routing) atau tap (layer 2 bridging)
# Gunakan 'tun' untuk routing, 'tap' untuk bridging
# Untuk Mikrotik, 'tun' sudah cukup
dev tun

# =============================================================
# SERVER NETWORK
# =============================================================

# Subnet untuk OpenVPN tunnel
# Mikrotik akan mendapat IP dari subnet ini
# Range: 172.31.119.0/24
# Server IP: 172.31.119.1
# Client IP: 172.31.119.2 - 172.31.119.254
server 172.31.119.0 255.255.255.0

#Jika pakai TAP (layer 2 bridging):
#push "route 172.31.119.0 255.255.255.0"

# =============================================================
# KEYS & CERTIFICATES
# =============================================================

# Path ke OpenVPN keys (jika pakai TLS authentication)
# Generate dengan: ./build-ca, ./build-key-server

# TLS ciphers - keamanan tinggi
#tls-cipher TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384

# Diffie-Hellman parameters (generate dengan: openssl dhparam -out dh2048.pem 2048)
#dh /etc/openvpn/dh2048.pem

# TLS Authentication (jika pakai ta.key)
#tls-auth /etc/openvpn/ta.key 0

# =============================================================
# AUTHENTICATION — FREE RADIUS INTEGRATION
# =============================================================

# auth-user-pass-verify: Jalankan script untuk validasi credentials
# via-env: Username & password Passed via environment variables
# script: /etc/openvpn/verify_radius.py
auth-user-pass-verify /etc/openvpn/verify_radius.py via-env

# verifikasi IP dari client
# Username-as-common-name: Gunakan username sebagai CN (Common Name)
# Ini penting untuk tracking & logging
username-as-common-name

# Nonaktifkan username/password hashing
# biarkan plaintext untuk RADIUS verify script
#auth-nocache

# =============================================================
# SECURITY SETTINGS
# =============================================================

# Encryption (AES-256-CBC = aman, performa baik)
cipher AES-256-CBC
auth SHA256

# Компрессия (LZ4 lebih cepat dari LZO)
#compress lz4-v2
#push "compress lz4-v2"

# Keepalive: ping every 10s, restart after 60s no response
keepalive 10 60

# Persist keys dan tun device
# Mencegah restart jika VPN reconnect
persist-key
persist-tun

# =============================================================
# LOGGING
# =============================================================

# Verbose level: 0=silent, 4=debug
verb 3

# Log ke file
status /var/log/openvpn/status.log
log-append /var/log/openvpn/server.log

# Rotate log jika > 10MB
#max-routes 100

# =============================================================
# ROUTING & DNS
# =============================================================

# DNS untuk client
push "dhcp-option DNS 8.8.8.8"
push "dhcp-option DNS 8.8.4.4"

# Domain untuk client
#push "dhcp-option DOMAIN local.net"

# Default gateway (jika client mau route semua traffic lewat VPN)
# FORWARD SELALU ke Mikrotik LAN
#push "redirect-gateway def1 bypass-dhcp"

# Route ke jaringan internal (FreeRADIUS, MySQL, dll)
# Sesuaikan dengan jaringan Anda
#push "route 172.31.119.0 255.255.255.0"

# =============================================================
# CLIENT CONFIG DIRECTORY
# =============================================================

# Direktori untuk client-specific config (static IP, routing, dll)
# Setiap file = nama client (username)
client-config-dir /etc/openvpn/ccd

# =============================================================
# MANAGEMENT INTERFACE
# =============================================================

# Management interface untuk monitoring (port 7505)
# Bind ke localhost saja untuk keamanan
management localhost 7505

# =============================================================
# BANDWIDTH LIMIT (jika diperlukan)
# =============================================================

# Limit bandwidth per client (dalam bytes per second)
# iproute marked packets with firewall mark
# Set di ccd (client config) atau firewall rules

# =============================================================
# FAILOVER & REDUNDANCY
# =============================================================

# Duplicate-cn: Izinkan multiple connections dengan same username
# Defaultnya disabled (1 connection per username)
duplicate-cn

# =============================================================
# CLIENT CONNECTION LIMITS
# =============================================================

# Max clients
max-clients 254

# =============================================================
# TOPOLOGY
# =============================================================

# Topology: subnet (setiap client dapat IP dari pool)
# Bukan net30 (kompatibilitas lama)
# Untuk Mikrotik, biasanya pakai net30 karena keterbatasan client OpenVPN
topology subnet

# =============================================================
# CUSTOM SCRIPT (jika diperlukan)
# =============================================================

# Script saat client connect
# learn-address /etc/openvpn/scripts/learn-address.sh

# Script saat client disconnect
# client-disconnect /etc/openvpn/scripts/client-disconnect.sh

# =============================================================
# OPTIMIZATION
# =============================================================

# Fragment (untuk UDP yang tidak reliable)
#fragment 1400

# MTU optimization
# mtu-test: auto-detect optimal MTU
#mtu-test

# TCP MSS clamping (untuk handle fragmentasi)
# MSS = MTU - IP header - TCP header = 1500 - 20 - 20 = 1460
#tun-mtu 1500
#tun-mtu-extra 32
#mssfix 1460